    gNB_name: 5G-NTN-gNB
    tracking_area_code: 1
    plmn_list:
      - mcc: 208
        mnc: 99
        mnc_length: 2
        snssaiList:
          - sst: 1
            sd: 0xffffff
    nr_cellid: 12345678
    min_rxtxtime: 6
    disable_harq: 1
    cu_sibs: [2]
    du_sibs: [19]

    servingCellConfigCommon:
      - physCellId: 0
        absoluteFrequencySSB: 436810
        dl_frequencyBand: 256
        dl_absoluteFrequencyPointA: 436390
        dl_offstToCarrier: 0
        dl_subcarrierSpacing: 0
        dl_carrierBandwidth: 25
        initialDLBWPlocationAndBandwidth: 6600
        initialDLBWPsubcarrierSpacing: 0
        initialDLBWPcontrolResourceSetZero: 2
        initialDLBWPsearchSpaceZero: 2
        ul_frequencyBand: 256
        ul_absoluteFrequencyPointA: 398390
        ul_offstToCarrier: 0
        ul_subcarrierSpacing: 0
        ul_carrierBandwidth: 25
        pMax: 20
        initialULBWPlocationAndBandwidth: 6600
        initialULBWPsubcarrierSpacing: 0
        prach_ConfigurationIndex: 98
        prach_msg1_FDM: 0
        prach_msg1_FrequencyStart: 0
        zeroCorrelationZoneConfig: 13
        preambleReceivedTargetPower: -118
        preambleTransMax: 6
        powerRampingStep: 1
        ssb_perRACH_OccasionAndCB_PreamblesPerSSB_PR: 4
        ssb_perRACH_OccasionAndCB_PreamblesPerSSB: 15
        ra_ContentionResolutionTimer: 7
        rsrp_ThresholdSSB: 19
        prach_RootSequenceIndex_PR: 2
        prach_RootSequenceIndex: 1
        msg1_SubcarrierSpacing: 0
        restrictedSetConfig: 0
        msg3_DeltaPreamble: 1
        p0_NominalWithGrant: -90
        pucchGroupHopping: 0
        hoppingId: 40
        p0_nominal: -90
        ssb_PositionsInBurst_Bitmap: 1
        ssb_periodicityServingCell: 2
        dmrs_TypeA_Position: 0
        subcarrierSpacing: 0
        referenceSubcarrierSpacing: 0
        dl_UL_TransmissionPeriodicity: 6
        nrofDownlinkSlots: 7
        nrofDownlinkSymbols: 6
        nrofUplinkSlots: 2
        nrofUplinkSymbols: 4
        ssPBCH_BlockPower: -25
        cellSpecificKoffset_r17: 478
        ta-Common-r17: 58629666
        positionX-r17: 0
        positionY-r17: 0
        positionZ-r17: 32433846
        velocityVX-r17: 0
        velocityVY-r17: 0
        velocityVZ-r17: 0

    TIMERS:
      sr_ProhibitTimer: 0
      sr_TransMax: 64
      sr_ProhibitTimer_v1700: 512
      t300: 2000
      t301: 2000
      t319: 2000

    SCTP:
      SCTP_INSTREAMS: 2
      SCTP_OUTSTREAMS: 2
    amf_ip_address:
      - ipv4: 192.168.71.132
    NETWORK_INTERFACES:
      GNB_IPV4_ADDRESS_FOR_NG_AMF: 192.168.71.140
      GNB_IPV4_ADDRESS_FOR_NGU: 192.168.71.140
      GNB_PORT_FOR_S1U: 2152

MACRLCs:
  - num_cc: 1
    tr_s_preference: local_L1
    tr_n_preference: local_RRC
    pusch_TargetSNRx10: 150
    pucch_TargetSNRx10: 200

L1s:
  - num_cc: 1
    tr_n_preference: local_mac
    prach_dtx_threshold: 120
    pucch0_dtx_threshold: 150
    ofdm_offset_divisor: 8

RUs:
  - local_rf: yes
    nb_tx: 1
    nb_rx: 1
    att_tx: 0
    att_rx: 0
    bands: [7]
    max_pdschReferenceSignalPower: -27
    max_rxgain: 114
    sf_extension: 0
    eNB_instances: [0]
    sdr_addrs: serial=XXXXXXX

THREAD_STRUCT:
  - parallel_config: PARALLEL_RU_L1_TRX_SPLIT
    worker_config: WORKER_DISABLE

rfsimulator:
  - serveraddr: server
    serverport: 4043
    options: []
    modelname: AWGN
    IQfile: /tmp/rfsimulator.iqs

security:
  ciphering_algorithms: [nea0]
  integrity_algorithms: [nia2, nia0]
  drb_ciphering: yes
  drb_integrity: no

log_config:
  global_log_level: info
  hw_log_level: info
  phy_log_level: info
  mac_log_level: info
  rlc_log_level: info
  pdcp_log_level: info
  rrc_log_level: info
  ngap_log_level: debug
  f1ap_log_level: debug
