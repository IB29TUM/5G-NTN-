<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OAI-NTN-ZeroRF Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a1a; color: #e0e0e0; margin: 0; padding: 1rem 2rem; min-height: 100vh; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #fff; }
    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }
    section { margin-bottom: 1.5rem; }
    section h2 { font-size: 1.1rem; color: #b0b0b0; margin-bottom: 0.5rem; }
    .status-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.healthy { background: #2e7d32; }
    .status-dot.unhealthy { background: #c62828; }
    .status-dot.unknown { background: #666; }
    .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.85rem; }
    .badge.pass { background: #2e7d32; color: #fff; }
    .badge.fail { background: #c62828; color: #fff; }
    table { border-collapse: collapse; width: 100%; max-width: 500px; }
    th, td { text-align: left; padding: 0.4rem 0.6rem; border-bottom: 1px solid #333; }
    th { color: #888; font-weight: 500; }
    #callflow-container { background: #252525; padding: 1rem; border-radius: 8px; overflow-x: auto; }
    .mermaid { background: transparent; }
    .meta { color: #888; font-size: 0.8rem; margin-top: 0.5rem; }
    pre { margin: 0; color: #ccc; }
  </style>
</head>
<body>
  <h1>OAI-NTN-ZeroRF Dashboard</h1>
  <p class="subtitle" id="scenario-subtitle">Software-Only 5G NTN Validation | OAI RFsimulator</p>
  <p style="color:#6a9; font-size:0.85rem;">Dashboard loaded. Data refreshes below.</p>

  <section>
    <h2>System Status</h2>
    <div id="status" class="status-grid">Loading...</div>
  </section>

  <section>
    <h2>Attach Result</h2>
    <div id="attach-result">-</div>
    <div id="attach-meta" class="meta"></div>
  </section>

  <section>
    <h2>NTN Configuration</h2>
    <table id="ntn-table">
      <tbody></tbody>
    </table>
  </section>

  <section>
    <h2>KPIs</h2>
    <table id="kpi-table">
      <tbody></tbody>
    </table>
  </section>

  <section>
    <h2>Call Flow</h2>
    <div id="callflow-container">
      <div id="callflow-mermaid"></div>
      <pre id="callflow-raw" style="display:none; white-space: pre-wrap; font-size: 0.85rem;"></pre>
    </div>
  </section>

  <script>
    (function() {
      function renderStatus(containers) {
        var el = document.getElementById('status');
        if (!el) return;
        var names = ['rfsim5g-mysql', 'rfsim5g-oai-amf', 'rfsim5g-oai-smf', 'rfsim5g-oai-upf', 'rfsim5g-oai-ext-dn', 'rfsim5g-oai-gnb', 'rfsim5g-oai-nr-ue'];
        if (!containers || containers.length === 0) {
          el.innerHTML = '<span class="status-dot unknown"></span> No container data (run demo first)';
          return;
        }
        var byName = {};
        containers.forEach(function(c) { byName[c.Name || c.name || ''] = c; });
        el.innerHTML = names.map(function(n) {
          var c = byName[n];
          var state = (c && (c.State || c.state || '')) + '';
          state = state.toLowerCase();
          var healthy = state.indexOf('running') !== -1;
          var cls = healthy ? 'healthy' : (state ? 'unhealthy' : 'unknown');
          return '<span title="' + n + '" class="status-dot ' + cls + '"></span> ' + n;
        }).join(' ');
      }

      function renderSummary(data) {
        if (!data) data = { error: 'No data' };
        var attachEl = document.getElementById('attach-result');
        var metaEl = document.getElementById('attach-meta');
        if (attachEl) {
          if (data.error) {
            attachEl.innerHTML = '<span class="badge fail">No report</span>';
          } else {
            attachEl.innerHTML = data.attach_success ? '<span class="badge pass">PASS</span>' : '<span class="badge fail">FAIL</span>';
          }
        }
        if (metaEl) metaEl.textContent = data.timestamp || '';

        var ntnTbody = document.querySelector('#ntn-table tbody');
        if (ntnTbody) {
          ntnTbody.innerHTML = '<tr><th>Band</th><td>' + (data.band != null ? data.band : '-') + '</td></tr>' +
            '<tr><th>Koffset (GEO)</th><td>' + (data.koffset != null ? data.koffset : '-') + '</td></tr>' +
            '<tr><th>HARQ disabled</th><td>' + (data.harq_disabled !== false ? 'Yes' : 'No') + '</td></tr>' +
            '<tr><th>Injected delay (ms)</th><td>' + (data.injected_delay_ms != null ? data.injected_delay_ms : '-') + '</td></tr>' +
            '<tr><th>SIB19 broadcast</th><td>' + (data.sib19_broadcast ? 'Yes' : 'No') + '</td></tr>';
        }
        var kpiTbody = document.querySelector('#kpi-table tbody');
        if (kpiTbody) {
          kpiTbody.innerHTML = '<tr><th>Attach success</th><td>' + (data.attach_success ? 'Yes' : 'No') + '</td></tr>' +
            '<tr><th>PDU session</th><td>' + (data.pdu_session_established ? 'Yes' : 'No') + '</td></tr>' +
            '<tr><th>Attach latency (ms)</th><td>' + (data.attach_latency_ms != null ? data.attach_latency_ms : '-') + '</td></tr>' +
            '<tr><th>Ping RTT avg (ms)</th><td>' + (data.ping_rtt_avg_ms != null ? data.ping_rtt_avg_ms : '-') + '</td></tr>' +
            '<tr><th>Ping RTT min (ms)</th><td>' + (data.ping_rtt_min_ms != null ? data.ping_rtt_min_ms : '-') + '</td></tr>' +
            '<tr><th>Ping RTT max (ms)</th><td>' + (data.ping_rtt_max_ms != null ? data.ping_rtt_max_ms : '-') + '</td></tr>';
        }
        var st = document.getElementById('scenario-subtitle');
        if (st && data.scenario) { st.textContent = data.scenario + ' | OAI RFsimulator'; }
      }

      function renderCallflow(md) {
        var raw = document.getElementById('callflow-raw');
        var mermaidEl = document.getElementById('callflow-mermaid');
        if (!raw || !mermaidEl) return;
        if (!md || !md.trim()) {
          mermaidEl.innerHTML = '';
          raw.style.display = 'block';
          raw.textContent = 'No callflow data. Run demo and export KPIs.';
          return;
        }
        var match = md.match(/```mermaid\n([\s\S]*?)```/);
        if (match && typeof window.mermaid !== 'undefined') {
          raw.style.display = 'none';
          mermaidEl.innerHTML = '';
          var code = match[1].trim();
          window.mermaid.render('cf1', code).then(function(result) { mermaidEl.innerHTML = result.svg; }).catch(function() {
            raw.style.display = 'block';
            raw.textContent = code;
          });
        } else {
          mermaidEl.innerHTML = '';
          raw.style.display = 'block';
          raw.textContent = match ? match[1] : md;
        }
      }

      function refresh() {
        fetch('/api/status').then(function(r) { return r.json(); }).then(function(d) { renderStatus(d && d.containers); }).catch(function() { renderStatus([]); });
        fetch('/api/summary').then(function(r) {
          if (r.status === 200) return r.json();
          return r.json().then(function(j) { return { error: (j && j.error) || 'Not found' }; }).catch(function() { return { error: 'Not found' }; });
        }).then(renderSummary).catch(function() { renderSummary({ error: 'Failed' }); });
        fetch('/api/callflow').then(function(r) { return r.status === 200 ? r.text() : ''; }).then(renderCallflow).catch(function() { renderCallflow(''); });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() { refresh(); });
      } else {
        refresh();
      }
      setInterval(refresh, 10000);
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js" crossorigin="anonymous" onload="if(window.mermaid){mermaid.initialize({startOnLoad:false,theme:'dark'});}"></script>
</body>
</html>
